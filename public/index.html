<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Energy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Loading -->
    <div id="loading" class="screen loading-screen">
      <div class="pulse-ring"></div>
      <p class="loading-text">Загружаю...</p>
    </div>

    <!-- Welcome (no data yet) -->
    <div id="welcome" class="screen hidden">
      <div class="welcome-content">
        <div class="welcome-icon">✨</div>
        <h1>Привет!</h1>
        <p>Напиши боту как ты себя чувствуешь — я начну отслеживать твою энергию.</p>
      </div>
    </div>

    <!-- Main app -->
    <div id="main" class="screen hidden">
      <!-- Header with greeting -->
      <header class="app-header">
        <div class="greeting">
          <span class="greeting-hi" id="greetingText">Привет</span>
          <span class="greeting-name" id="userName"></span>
        </div>
        <div class="date" id="currentDate"></div>
      </header>

      <!-- Views container -->
      <main class="views">
        <!-- Dashboard -->
        <section id="v-dashboard" class="view">
          <div class="energy-rings">
            <div class="ring-card" data-type="physical">
              <div class="ring-wrap">
                <svg viewBox="0 0 100 100">
                  <circle class="ring-bg" cx="50" cy="50" r="42"/>
                  <circle class="ring-fill" cx="50" cy="50" r="42"/>
                </svg>
                <div class="ring-inner">
                  <span class="ring-val">—</span>
                  <span class="ring-emoji">🏃</span>
                </div>
              </div>
              <span class="ring-label">Физическая</span>
            </div>
            <div class="ring-card" data-type="mental">
              <div class="ring-wrap">
                <svg viewBox="0 0 100 100">
                  <circle class="ring-bg" cx="50" cy="50" r="42"/>
                  <circle class="ring-fill" cx="50" cy="50" r="42"/>
                </svg>
                <div class="ring-inner">
                  <span class="ring-val">—</span>
                  <span class="ring-emoji">🧠</span>
                </div>
              </div>
              <span class="ring-label">Ментальная</span>
            </div>
            <div class="ring-card" data-type="emotional">
              <div class="ring-wrap">
                <svg viewBox="0 0 100 100">
                  <circle class="ring-bg" cx="50" cy="50" r="42"/>
                  <circle class="ring-fill" cx="50" cy="50" r="42"/>
                </svg>
                <div class="ring-inner">
                  <span class="ring-val">—</span>
                  <span class="ring-emoji">💚</span>
                </div>
              </div>
              <span class="ring-label">Эмоциональная</span>
            </div>
            <div class="ring-card" data-type="spiritual">
              <div class="ring-wrap">
                <svg viewBox="0 0 100 100">
                  <circle class="ring-bg" cx="50" cy="50" r="42"/>
                  <circle class="ring-fill" cx="50" cy="50" r="42"/>
                </svg>
                <div class="ring-inner">
                  <span class="ring-val">—</span>
                  <span class="ring-emoji">🔮</span>
                </div>
              </div>
              <span class="ring-label">Духовная</span>
            </div>
          </div>
          <p class="last-update" id="lastUpdate"></p>

          <!-- Recent observations -->
          <div class="observations-section" id="obsSection">
            <h2 class="section-title">Последние наблюдения</h2>
            <div class="obs-list" id="obsList"></div>
          </div>
        </section>

        <!-- Timeline -->
        <section id="v-timeline" class="view hidden">
          <div class="timeline-header">
            <div class="period-pills">
              <button class="pill active" data-period="week">7 дней</button>
              <button class="pill" data-period="month">30 дней</button>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="historyChart"></canvas>
          </div>
          <p id="timelineEmpty" class="empty-msg hidden">Пока нет данных</p>
        </section>

        <!-- Journal -->
        <section id="v-journal" class="view hidden">
          <div class="journal-list" id="journalList">
            <div class="journal-loading">
              <div class="pulse-ring small"></div>
              <p>Загружаю дневник...</p>
            </div>
          </div>
        </section>
      </main>

      <!-- Bottom nav -->
      <nav class="bottom-nav">
        <button class="nav-btn active" data-view="v-dashboard">
          <span class="nav-icon">⚡</span>
          <span class="nav-label">Энергия</span>
        </button>
        <button class="nav-btn" data-view="v-timeline">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Динамика</span>
        </button>
        <button class="nav-btn" data-view="v-journal">
          <span class="nav-icon">📖</span>
          <span class="nav-label">Дневник</span>
        </button>
      </nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="app.js"></script>
</body>
</html>

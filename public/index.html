<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Dashboard</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Energy Dashboard</h1>
    </header>

    <main class="main">
      <!-- Loading state -->
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Загрузка данных...</p>
      </div>

      <!-- Error state -->
      <div id="error" class="error hidden">
        <p class="error-text"></p>
      </div>

      <!-- Dashboard view -->
      <div id="dashboard" class="dashboard hidden">
        <div class="energy-grid">
          <div class="energy-card" data-type="physical">
            <div class="gauge-container">
              <svg class="gauge" viewBox="0 0 120 120">
                <circle class="gauge-bg" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" />
              </svg>
              <span class="gauge-value">0</span>
            </div>
            <span class="energy-label">Физическая</span>
          </div>

          <div class="energy-card" data-type="mental">
            <div class="gauge-container">
              <svg class="gauge" viewBox="0 0 120 120">
                <circle class="gauge-bg" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" />
              </svg>
              <span class="gauge-value">0</span>
            </div>
            <span class="energy-label">Ментальная</span>
          </div>

          <div class="energy-card" data-type="emotional">
            <div class="gauge-container">
              <svg class="gauge" viewBox="0 0 120 120">
                <circle class="gauge-bg" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" />
              </svg>
              <span class="gauge-value">0</span>
            </div>
            <span class="energy-label">Эмоциональная</span>
          </div>

          <div class="energy-card" data-type="spiritual">
            <div class="gauge-container">
              <svg class="gauge" viewBox="0 0 120 120">
                <circle class="gauge-bg" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" />
              </svg>
              <span class="gauge-value">0</span>
            </div>
            <span class="energy-label">Духовная</span>
          </div>
        </div>

        <p class="logged-at" id="loggedAt"></p>
      </div>

      <!-- History view -->
      <div id="history" class="history-view hidden">
        <div class="period-toggle">
          <button class="period-btn active" data-period="week">Неделя</button>
          <button class="period-btn" data-period="month">Месяц</button>
        </div>
        <div class="chart-container">
          <canvas id="historyChart"></canvas>
        </div>
        <p id="historyEmpty" class="history-empty hidden">Нет данных за этот период</p>
      </div>

      <!-- Analytics view -->
      <div id="analytics" class="analytics-view hidden">
        <!-- Analytics loading -->
        <div id="analyticsLoading" class="analytics-loading">
          <div class="spinner"></div>
          <p>Анализирую паттерны...</p>
        </div>

        <!-- Not enough data -->
        <div id="analyticsNoData" class="analytics-no-data hidden">
          <div class="no-data-icon">&#128202;</div>
          <p id="analyticsNoDataMsg"></p>
        </div>

        <!-- Analytics content -->
        <div id="analyticsContent" class="analytics-content hidden">
          <!-- Stats summary bar -->
          <div class="stats-bar">
            <div class="stat-card" data-stat="physical">
              <span class="stat-value">-</span>
              <span class="stat-label">Физическая</span>
            </div>
            <div class="stat-card" data-stat="mental">
              <span class="stat-value">-</span>
              <span class="stat-label">Ментальная</span>
            </div>
            <div class="stat-card" data-stat="emotional">
              <span class="stat-value">-</span>
              <span class="stat-label">Эмоциональная</span>
            </div>
            <div class="stat-card" data-stat="spiritual">
              <span class="stat-value">-</span>
              <span class="stat-label">Духовная</span>
            </div>
          </div>

          <p class="stats-meta" id="statsMeta"></p>

          <!-- AI insights -->
          <div class="insights-section">
            <h2 class="insights-heading">AI-аналитика паттернов</h2>
            <div id="insightsList" class="insights-list"></div>
          </div>
        </div>
      </div>
    </main>

    <nav class="tab-nav">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="analytics">Analytics</button>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="history.js"></script>
  <script src="app.js"></script>
</body>
</html>
